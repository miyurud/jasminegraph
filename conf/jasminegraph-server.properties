org.jasminegraph.vectorstore.embedding.model=nomic-embed-text
org.jasminegraph.vectorstore.embedding.ollama.endpoint=http://172.30.5.100:11441

#--------------------------------------------------------------------------------
# Temporal Storage Configuration
#--------------------------------------------------------------------------------
# Enable or disable temporal graph storage (true/false)
# When enabled, tracks edge existence and property changes across snapshots
org.jasminegraph.temporal.enabled=true

# Snapshot creation strategy: time | count | hybrid | adaptive
# - time: Create snapshot every N seconds (see snapshot.time.seconds)
# - count: Create snapshot every N edges (see snapshot.edge.count)
# - hybrid: Create snapshot when EITHER time OR count threshold is reached
# - adaptive: Dynamically calculate optimal snapshot size based on system load
org.jasminegraph.temporal.snapshot.mode=hybrid

# Time-based snapshot trigger: Create snapshot every N seconds
# Example: 60 = create snapshot every 1 minute
org.jasminegraph.temporal.snapshot.time.seconds=300

# Count-based snapshot trigger: Create snapshot every N edges
# Example: 10000 = create snapshot when 10,000 edges have been ingested
# CHANGED: Increased to 5000 for performance testing with large graphs
org.jasminegraph.temporal.snapshot.edge.count=100000

# Enable bitmap compression using Run-Length Encoding (RLE)
# Significantly reduces storage for sparse bitmaps
org.jasminegraph.temporal.compression.enabled=true

# Storage path for temporal data (snapshots, bitmaps, property intervals)
# This should be on a disk with sufficient space for historical data
org.jasminegraph.temporal.storage.path=/var/tmp/jasminegraph-temporal/

# Retention policy: Keep snapshots for N days (0 = keep forever)
# Old snapshots will be automatically deleted after this period
org.jasminegraph.temporal.retention.days=30

# Maximum number of snapshots per partition before triggering compaction
# Compaction merges old snapshots to save space
org.jasminegraph.temporal.max.snapshots=1000

# Adaptive snapshot sizing parameters (used when mode=adaptive)
# Maximum memory allocated for snapshot buffering (in MB)
org.jasminegraph.temporal.adaptive.max.memory.mb=512

# Maximum flush delay (seconds) - max time to wait before writing to disk
org.jasminegraph.temporal.adaptive.max.flush.delay=10



