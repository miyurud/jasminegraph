services:
  jasminegraph:
    image: jasminegraph:latest
    ports:
      - '8777:8777'
      - '8778:8778'
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
      - "/root/.ssh:/root/.ssh"
      - "/tmp:/tmp"
      - "/var/tmp/jasminegraph-localstore-tmp:/var/tmp/jasminegraph-localstore-tmp"
      - "/var/tmp/jasminegraph-aggregate:/var/tmp/jasminegraph-aggregate"
      - "/home/user/Documents/jasminegraph/metadb:/home/ubuntu/software/jasminegraph/metadb"
      - "/home/user/Documents/MSc/jasminegraph/performancedb:/home/ubuntu/software/jasminegraph/performancedb"
    networks:
      jasminenet:
        ipv4_address: 172.28.5.7
    command: --MODE 1 --MASTERIP 10.8.100.247 --WORKERS 2 --WORKERIP root@10.8.100.245 --ENABLE_NMON false
    depends_on:
      - kafka

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://172.28.5.8:9092,CONTROLLER://172.28.5.8:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.28.5.8:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@172.28.5.8:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 8
      CLUSTER_ID: ciWo7IWazngRchmPES6q5A==
    networks:
      jasminenet:
        ipv4_address: 172.28.5.8

networks:
  jasminenet:
    external: false
    name: jasminenet
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.5.0/24
          ip_range: 172.28.5.0/24
          gateway: 172.28.5.1
